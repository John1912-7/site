name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build expanded static site
        shell: pwsh
        run: ./tools/build-growth-site.ps1
      - name: Rewrite sitemap
        shell: pwsh
        run: |
          $siteUrl = 'https://john1912-7.github.io/site'
          $today = '2026-06-23'
          $slugs = @(
            '',
            'about',
            'contact',
            'posts/shuny-qashum-e-kapy',
            'posts/shan-dzagy-kcum-e-dzerqery',
            'posts/shuny-chcatkel-mardkanc-vra',
            'posts/sovorecnel-shany-ari-hramany',
            'posts/inchu-e-shuny-hachum',
            'posts/inchpes-sovorecnel-shany-nstel',
            'posts/shuny-chi-lsum-inch-anel',
            'posts/shuny-vakhenum-e-dursum',
            'posts/shuny-menak-mnalis-hachum-e',
            'posts/shan-dzagi-khnamq-arajin-orer',
            'posts/shan-patvastumner-hayastanum',
            'posts/shuny-che-utum-inch-anel',
            'posts/shuny-krcum-e-kahuyqy',
            'posts/shuny-vazum-e-mardkanc-koghm',
            'posts/inchpes-sovorecnel-shany-teghy-hramany'
          )
          $entries = $slugs | ForEach-Object {
            $url = if ($_ -eq '') { "$siteUrl/" } else { "$siteUrl/$_/" }
            "  <url><loc>$url</loc><lastmod>$today</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>"
          }
          $sitemap = "<?xml version='1.0' encoding='UTF-8'?>`n<urlset xmlns='http://www.sitemaps.org/schemas/sitemap/0.9'>`n$($entries -join "`n")`n</urlset>`n"
          Set-Content -LiteralPath site-growth-update/sitemap.xml -Value $sitemap -Encoding UTF8
      - name: Validate sitemap
        shell: pwsh
        run: |
          $path = 'site-growth-update/sitemap.xml'
          if (-not (Test-Path $path)) { throw 'sitemap.xml was not generated' }
          [xml]$xml = Get-Content -LiteralPath $path -Raw
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace('sm', 'http://www.sitemaps.org/schemas/sitemap/0.9')
          $locs = $xml.SelectNodes('//sm:url/sm:loc', $ns) | ForEach-Object { $_.InnerText }
          if ($locs.Count -ne 18) { throw "Expected 18 sitemap URLs, got $($locs.Count)" }
          foreach ($loc in $locs) {
            if ($loc -notmatch '^https://john1912-7\.github\.io/site/(posts/[a-z0-9-]+/|about/|contact/)?$') { throw "Unexpected sitemap URL: $loc" }
          }
          if (($locs | Select-Object -Unique).Count -ne $locs.Count) { throw 'Duplicate URLs in sitemap' }
          Write-Host "Validated sitemap with $($locs.Count) URLs"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-growth-update
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
